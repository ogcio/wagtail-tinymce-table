name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: "Python ${{ matrix.python }} · ${{ matrix.wagtail }} · ${{ matrix.django }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Wagtail 5 LTS (oldest actively supported) ──────────────────
          - python: "3.9"
            wagtail: "wagtail>=5.2,<6"
            django: "django>=4.2,<5"

          - python: "3.11"
            wagtail: "wagtail>=5.2,<6"
            django: "django>=4.2,<5"

          # ── Wagtail 6 ───────────────────────────────────────────────────
          - python: "3.11"
            wagtail: "wagtail>=6.3,<7"
            django: "django>=4.2,<5"

          - python: "3.12"
            wagtail: "wagtail>=6.3,<7"
            django: "django>=5.2,<6"

          # ── Wagtail 7 (requires Python ≥ 3.10) ─────────────────────────
          - python: "3.10"
            wagtail: "wagtail>=7.3,<8"
            django: "django>=4.2,<5"

          - python: "3.12"
            wagtail: "wagtail>=7.3,<8"
            django: "django>=5.2,<6"

          - python: "3.13"
            wagtail: "wagtail>=7.3,<8"
            django: "django>=5.2,<6"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "${{ matrix.wagtail }}" \
            "${{ matrix.django }}" \
            -e ".[dev]"

      - name: Run tests
        run: pytest -v
