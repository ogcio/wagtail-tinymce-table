name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  # ── 1. Run the full test matrix before publishing ────────────────────────────
  test:
    name: "Python ${{ matrix.python }} · ${{ matrix.wagtail }} · ${{ matrix.django }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.9"
            wagtail: "wagtail>=5.2,<6"
            django: "django>=4.2,<5"

          - python: "3.11"
            wagtail: "wagtail>=5.2,<6"
            django: "django>=4.2,<5"

          - python: "3.11"
            wagtail: "wagtail>=6.3,<7"
            django: "django>=4.2,<5"

          - python: "3.12"
            wagtail: "wagtail>=6.3,<7"
            django: "django>=5.2,<6"

          - python: "3.10"
            wagtail: "wagtail>=7.3,<8"
            django: "django>=4.2,<5"

          - python: "3.12"
            wagtail: "wagtail>=7.3,<8"
            django: "django>=5.2,<6"

          - python: "3.13"
            wagtail: "wagtail>=7.3,<8"
            django: "django>=5.2,<6"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "${{ matrix.wagtail }}" \
            "${{ matrix.django }}" \
            -e ".[dev]"

      - name: Run tests
        run: pytest -v

  # ── 2. Build the distribution ────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to PyPI via Trusted Publishing (OIDC — no token needed) ───────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    # Required for Trusted Publishing (OIDC)
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/wagtail-tinymce-table

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
