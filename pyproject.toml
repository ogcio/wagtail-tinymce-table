[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "wagtail-tinymce"
version = "0.1.0"
description = "TinyMCE-powered StreamField blocks for Wagtail, including a table block with Excel paste support."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = [
    "wagtail>=4.0",
    "django-tinymce>=3.5",
    "bleach>=6.0",
    "beautifulsoup4>=4.12",
    "lxml>=4.9",
]

[project.optional-dependencies]
localize = [
    "wagtail-localize>=1.5",
]
dev = [
    "pytest",
    "pytest-django",
    "wagtail-localize>=1.5",
]

[project.urls]
Repository = "https://github.com/your-org/wagtail-tinymce"

[tool.setuptools.packages.find]
include = ["wagtailtinymce*"]

[tool.setuptools.package-data]
"wagtailtinymce" = ["static/**/*"]
